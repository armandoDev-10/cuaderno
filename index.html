<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armando Hernández · Cuaderno Profesional</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-color: #7f1d1d;
      --secondary-color: #b91c1c;
      --accent-color: #d97706;
      --dark-bg: #0f172a;
      --text-color: #fef2f2;
      --text-secondary: #fecaca;
      --card-bg: rgba(127, 29, 29, 0.08);
      --border-color: rgba(127, 29, 29, 0.2);
      --shadow-color: rgba(0, 0, 0, 0.1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      color: var(--text-color);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
    }
    
    body {
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    main {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.7);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
    }
    
    /* ===== BARRA DE NAVEGACIÓN CON BOTÓN AL CV ===== */
    .navbar-custom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: var(--accent-color);
    }
    .btn-cv {
      background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      border: none;
      color: white !important;
    }
    .btn-cv:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
    }
    
    /* ===== TARJETAS Y SECCIONES (igual que CV) ===== */
    .section-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
    }
    .section-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(127, 29, 29, 0.2);
      border-color: rgba(217, 119, 6, 0.4);
    }
    .section-title {
      color: var(--accent-color);
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent-color);
      display: inline-block;
    }
    .badge-count {
      background: rgba(217, 119, 6, 0.2);
      border: 1px solid var(--accent-color);
      border-radius: 40px;
      padding: 0.2rem 0.8rem;
      font-size: 0.8rem;
      margin-left: 1rem;
    }
    
    /* ===== TABLAS (diseño oscuro) ===== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .data-table th, .materia-table th {
      text-align: left;
      padding: 0.75rem 0.5rem;
      font-weight: 600;
      color: var(--accent-color);
      border-bottom: 1px solid var(--border-color);
    }
    .data-table td, .materia-table td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-secondary);
    }
    .table-link {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 500;
    }
    .table-link:hover {
      text-decoration: underline;
    }
    .materia-table-wrapper {
      margin-bottom: 1.8rem;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,0.2);
    }
    .materia-table-caption {
      background: rgba(127, 29, 29, 0.3);
      padding: 0.6rem 1rem;
      font-weight: 700;
      font-size: 1.1rem;
      border-left: 4px solid var(--accent-color);
    }
    .tech-tag {
      background: rgba(217, 119, 6, 0.2);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      color: var(--text-secondary);
    }
    
    footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    @media (max-width: 768px) {
      main { padding: 1rem; }
      .section-card { padding: 1rem; }
      .navbar-custom { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; }
      .btn-cv { text-align: center; justify-content: center; }
      .data-table th, .data-table td { padding: 0.5rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<main>
  <!-- Barra de navegación con botón al CV -->
  <div class="navbar-custom">
    <div class="nav-links">
      <a href="#apuntes"><i class="fas fa-graduation-cap"></i> Apuntes</a>
      <a href="#sitios"><i class="fas fa-globe"></i> Sitios web</a>
      <a href="#bases"><i class="fas fa-database"></i> Bases de datos</a>
    </div>
    <a href="https://armandodev-10.github.io/cv" target="_blank" class="btn-cv">
      <i class="fas fa-user-circle"></i> Ver mi CV profesional
    </a>
  </div>

  <!-- Sección Apuntes -->
  <div id="apuntes" class="section-card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
      <h2 class="section-title"><i class="fas fa-notebook"></i> Apuntes por materia</h2>
      <span class="badge-count" id="apuntes-count">0</span>
    </div>
    <div id="apuntes-container">
      <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Cargando apuntes...</div>
    </div>
  </div>

  <!-- Sección Sitios propios -->
  <div id="sitios" class="section-card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
      <h2 class="section-title"><i class="fas fa-globe"></i> Sitios web</h2>
      <span class="badge-count" id="sitios-count">0</span>
    </div>
    <div id="sitios-container">
      <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Cargando sitios...</div>
    </div>
  </div>

  <!-- Sección Bases de datos propias -->
  <div id="bases" class="section-card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
      <h2 class="section-title"><i class="fas fa-database"></i> Bases de datos</h2>
      <span class="badge-count" id="bases-count">0</span>
    </div>
    <div id="bases-container">
      <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Cargando bases de datos...</div>
    </div>
  </div>

  <footer>
    <i class="fas fa-edit"></i> Datos editables en apuntes.js, sitios.js, bases.js · <i class="fas fa-sync-alt"></i> Actualización en caliente
  </footer>
</main>

<!-- Archivos de datos externos (deben estar en la misma carpeta) -->
<script src="apuntes.js"></script>
<script src="sitios.js"></script>
<script src="bases.js"></script>

<script>
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Render Apuntes (agrupados por materia)
  function renderApuntes(data, container, countBadge) {
    container.innerHTML = '';
    if (!data || !data.length) {
      container.innerHTML = '<div class="empty-state">📘 No hay apuntes. Edita apuntes.js</div>';
      countBadge.textContent = '0';
      return;
    }
    countBadge.textContent = data.length;
    const groups = new Map();
    for (const item of data) {
      const materia = item.materia || 'General';
      if (!groups.has(materia)) groups.set(materia, []);
      groups.get(materia).push({ fecha: item.fecha || '—', link: item.link || '#' });
    }
    for (const [materia, lista] of groups.entries()) {
      const wrapper = document.createElement('div');
      wrapper.className = 'materia-table-wrapper';
      wrapper.innerHTML = `
        <div class="materia-table-caption"><i class="fas fa-folder-open"></i> ${escapeHtml(materia)} <span style="font-size:0.75rem;">(${lista.length})</span></div>
        <table class="data-table">
          <thead><tr><th>Fecha</th><th>Enlace (Notion)</th></tr></thead>
          <tbody></tbody>
        </table>
      `;
      const tbody = wrapper.querySelector('tbody');
      lista.forEach(ap => {
        const row = document.createElement('tr');
        const linkHtml = (ap.link && ap.link !== '#') 
          ? `<a href="${ap.link}" target="_blank" class="table-link"><i class="fas fa-external-link-alt"></i> Abrir</a>`
          : '<span style="color:#aaa;">Sin enlace</span>';
        row.innerHTML = `<td>${escapeHtml(ap.fecha)}</td><td>${linkHtml}</td>`;
        tbody.appendChild(row);
      });
      container.appendChild(wrapper);
    }
  }

  // Render Sitios propios
  function renderSitios(data, container, countBadge) {
    container.innerHTML = '';
    if (!data || !data.length) {
      container.innerHTML = '<div class="empty-state">🌐 No hay sitios propios. Edita sitios.js</div>';
      countBadge.textContent = '0';
      return;
    }
    countBadge.textContent = data.length;
    const table = document.createElement('table');
    table.className = 'data-table';
    table.innerHTML = `<thead><tr><th>Proyecto</th><th>Descripción</th><th>Enlace</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    data.forEach(site => {
      const nombre = site.nombre || site.titulo || 'Sin título';
      const desc = site.descripcion || site.desc || '';
      const url = site.url || site.link || '#';
      const linkCell = (url !== '#') ? `<a href="${url}" target="_blank" class="table-link">Visitar <i class="fas fa-arrow-right"></i></a>` : '—';
      const row = document.createElement('tr');
      row.innerHTML = `<td><strong>${escapeHtml(nombre)}</strong></td><td>${escapeHtml(desc)}</td><td>${linkCell}</td>`;
      tbody.appendChild(row);
    });
    container.appendChild(table);
  }

  // Render Bases de datos propias
  function renderBases(data, container, countBadge) {
    container.innerHTML = '';
    if (!data || !data.length) {
      container.innerHTML = '<div class="empty-state">🗄️ No hay bases de datos propias. Edita bases.js</div>';
      countBadge.textContent = '0';
      return;
    }
    countBadge.textContent = data.length;
    const table = document.createElement('table');
    table.className = 'data-table';
    table.innerHTML = `<thead><tr><th>Nombre</th><th>Tecnología</th><th>Descripción</th><th>Recurso</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    data.forEach(db => {
      const nombre = db.nombre || db.name || '—';
      const tecnologia = db.tecnologia || db.motor || '—';
      const desc = db.descripcion || db.desc || '';
      const linkDoc = db.link || db.documentacion || null;
      const docCell = (linkDoc && linkDoc !== '#') ? `<a href="${linkDoc}" target="_blank" class="table-link">Documentación <i class="fas fa-book"></i></a>` : '—';
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><strong>${escapeHtml(nombre)}</strong></td>
        <td><span class="tech-tag">${escapeHtml(tecnologia)}</span></td>
        <td>${escapeHtml(desc)}</td>
        <td>${docCell}</td>
      `;
      tbody.appendChild(row);
    });
    container.appendChild(table);
  }

  // Cargar datos desde variables globales (definidas en los .js externos)
  function init() {
    if (typeof apuntesData !== 'undefined') renderApuntes(apuntesData, document.getElementById('apuntes-container'), document.getElementById('apuntes-count'));
    else document.getElementById('apuntes-container').innerHTML = '<div class="empty-state">❌ Error: apuntesData no definido. Revisa apuntes.js</div>';
    
    if (typeof sitiosData !== 'undefined') renderSitios(sitiosData, document.getElementById('sitios-container'), document.getElementById('sitios-count'));
    else document.getElementById('sitios-container').innerHTML = '<div class="empty-state">❌ Error: sitiosData no definido. Revisa sitios.js</div>';
    
    if (typeof basesData !== 'undefined') renderBases(basesData, document.getElementById('bases-container'), document.getElementById('bases-count'));
    else document.getElementById('bases-container').innerHTML = '<div class="empty-state">❌ Error: basesData no definido. Revisa bases.js</div>';
  }
  init();
</script>
</body>
</html>
